{% extends "base.html" %}

{% block title %}Update Trek{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h2 class="mb-2">Update Trek</h2>
                <p class="text-muted mb-4">{{ trek.name }}</p>

                <form method="POST">

                    <div class="mb-3">
                        <label for="available_slots" class="form-label">
                            Available Slots
                        </label>

                        <input
                            type="number"
                            id="available_slots"
                            name="available_slots"
                            class="form-control"
                            value="{{ trek.available_slots }}"
                            min="0"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">
                            Status
                        </label>

                        <select
                            id="status"
                            name="status"
                            class="form-select"
                            required
                        >
                            {% for status in ["Open", "Closed", "Completed"] %}
                                <option
                                    value="{{ status }}"
                                    {% if trek.status == status %}selected{% endif %}
                                >
                                    {{ status }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            Update Trek
                        </button>

                        <a
                            href="{{ url_for('staff_dashboard') }}"
                            class="btn btn-outline-secondary"
                        >
                            Cancel
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
