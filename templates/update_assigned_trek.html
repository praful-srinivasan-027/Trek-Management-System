<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Trek</title>
</head>
<body>

    <h1>Update {{ trek.name }}</h1>

    <form method="POST">
        <label for="available_slots">Available Slots:</label>
        <input
            type="number"
            id="available_slots"
            name="available_slots"
            value="{{ trek.available_slots }}"
            min="0"
            required
        >

        <br><br>

        <label for="status">Status:</label>
        <select id="status" name="status" required>
            {% for status in ["Open", "Closed", "Completed"] %}
                <option
                    value="{{ status }}"
                    {% if trek.status == status %}selected{% endif %}
                >
                    {{ status }}
                </option>
            {% endfor %}
        </select>

        <br><br>

        <button type="submit">Update Trek</button>
    </form>

    <br>

    <a href="{{ url_for('staff_dashboard') }}">Back to Dashboard</a>

</body>
</html>
