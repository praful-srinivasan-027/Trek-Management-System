{% extends "base.html" %}

{% block title %}Edit Trek{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h2 class="mb-4">Edit Trek</h2>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Trek Name</label>
                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            value="{{ trek.name }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input
                            type="text"
                            class="form-control"
                            name="location"
                            value="{{ trek.location }}"
                            required
                        >
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Difficulty</label>

                            <select class="form-select" name="difficulty" required>
                                {% for difficulty in ["Easy", "Moderate", "Hard"] %}
                                    <option
                                        value="{{ difficulty }}"
                                        {% if trek.difficulty == difficulty %}selected{% endif %}
                                    >
                                        {{ difficulty }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Duration (days)</label>
                            <input
                                type="number"
                                class="form-control"
                                name="duration"
                                value="{{ trek.duration }}"
                                min="1"
                                required
                            >
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Available Slots</label>
                        <input
                            type="number"
                            class="form-control"
                            name="available_slots"
                            value="{{ trek.available_slots }}"
                            min="0"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Status</label>

                        <select class="form-select" name="status" required>
                            {% for status in ["Pending", "Approved", "Open", "Closed", "Completed"] %}
                                <option
                                    value="{{ status }}"
                                    {% if trek.status == status %}selected{% endif %}
                                >
                                    {{ status }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Start Date</label>
                            <input
                                type="date"
                                class="form-control"
                                name="start_date"
                                value="{{ trek.start_date }}"
                                required
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">End Date</label>
                            <input
                                type="date"
                                class="form-control"
                                name="end_date"
                                value="{{ trek.end_date }}"
                                required
                            >
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            Save Changes
                        </button>

                        <a
                            href="{{ url_for('admin_dashboard') }}"
                            class="btn btn-outline-secondary"
                        >
                            Cancel
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
