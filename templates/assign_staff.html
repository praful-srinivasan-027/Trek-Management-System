{% extends "base.html" %}

{% block title %}Assign Staff{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <h2 class="mb-2">Assign Staff</h2>
                <p class="text-muted mb-4">
                    Select a staff member for <strong>{{ trek.name }}</strong>.
                </p>

                <form method="POST">

                    <div class="mb-3">
                        <label for="staff_id" class="form-label">
                            Staff Member
                        </label>

                        <select
                            id="staff_id"
                            name="staff_id"
                            class="form-select"
                            required
                        >
                            {% for staff in approved_staff %}
                                <option value="{{ staff.id }}">
                                    {{ staff.name }} — {{ staff.email }}
                                </option>
                            {% else %}
                                <option disabled>
                                    No approved staff available
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            Assign Staff
                        </button>

                        <a
                            href="{{ url_for('admin_dashboard') }}"
                            class="btn btn-outline-secondary"
                        >
                            Cancel
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
